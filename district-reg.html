 <br>
<form [formGroup]="districtform">
 <div class="col-sm-12 col-xl-6">
                        <div class="bg-light rounded h-100 p-4">
                            <h6 class="mb-4">District Regesiter</h6>
                            <div class="form-floating mb-3">
                                <select class="form-select" id="floatingSelect"
                                    aria-label="Floating label select example"
                                    formControlName="state">
                                     <option selected>----States----</option>
                                    @for(data of stateary;track data;let i=$index){
                                    <option [value]="data.state_id" >{{data.state}}</option >
                                    }
                                </select>
                                <label for="floatingSelect">Selects  the State</label>
                            </div>
                           
                             <div class="form-floating mb-3">
                                   
                                <input type="email" class="form-control" id="floatingInput"
                                    placeholder="District" formControlName="district">
                                <label for="floatingInput">District Name</label>
                                 @if (districtform.controls['district']?.hasError('required') && districtform.touched) {
                        <small class="error" style="color: red;">District is required</small>
                        }
                            </div>
                           
                       <div class="d-grid gap-2">
  <button class="btn btn-primary" type="button" (click)="Submit()" [disabled]="districtform.invalid">Submit</button>
</div>                          
                        </div>
                         </div>
                   </form>     
                   <br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br>
