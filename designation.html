 <br>
<form [formGroup]="designationform">
 <div class="col-sm-12 col-xl-6">
                        <div class="bg-light rounded h-100 p-4">
                            <h6 class="mb-4">Designation Regesiter</h6>
          <div class="form-floating mb-3">
                                   
                                <input type="email" class="form-control" id="floatingInput"
                                    placeholder="eg:junior developer" formControlName="designation"
                                    required  oninvalid="this.setCustomValidity('Enter Designation Name')"
           oninput="this.setCustomValidity('')">
                                <label for="floatingInput">designation Name</label>
                            </div>
                           
                       <div class="d-grid gap-2">
  <button class="btn btn-primary" type="button" (click)="Submit()" [disabled]="designationform.invalid">Submit</button>
</div>                          
                        </div>
                         </div>
                   </form>     
               <br><br>
                            <table class="table table-bordered">
                                <thead>
                                    <tr>
                                        <th scope="col">#</th>
                                        <th scope="col">Designation</th>
                                         <th scope="col">Action</th>
                                    </tr>
                                </thead>
                                <tbody>
                                      @for(data of designationarry;track data;let i=$index){  
                                    <tr>
                                        <th scope="row">{{i + 1}}</th>     
                                         <td>{{data.designation}}</td> 
                                         <td>
                                         <button type="button" class="btn btn-outline-primary" (click)="del(data.designation_id )">Delete</button></td>  
                                        </tr>
                                 } 
                                </tbody>
                            </table>
