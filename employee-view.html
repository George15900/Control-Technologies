<br>
<h5 class="mb-4">Employee View</h5>
<form class="d-flex" role="search" style="margin-left: 65%; margin-right: 5%;" [formGroup]="searchForm">
    <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search" formControlName="search" />
    <button class="btn btn-outline-success" type="submit" (click)="onSearch()">Search</button>
</form>
<br><br>
<table class="table table-bordered">
    <thead>
        <tr>
            <th scope="col">#</th>
            <th scope="col">ID</th>
            <th scope="col">Name</th>
            <th scope="col">G-Mail</th>
            <th scope="col">Gender</th>
            <th scope="col">View more</th>
        </tr>
    </thead>
    <tbody>
        @for(data of empary;track data;let i=$index){
        <tr>
            <th scope="row">{{i + 1}}</th>
            <td>{{data.employee_id_num}}</td>
            <td>{{data.employee_name}}</td>
            <td>{{data.emp_mail}}</td>
            <td>{{data.gender}}</td>
            <td>
                <a>
                    <button type="button" class="btn btn-outline-primary"
                        [routerLink]="['/adminmaster/employee-viewdetails',data.employee_id]">view more</button></a>
            </td>
        </tr>
        }
    </tbody>
</table>
